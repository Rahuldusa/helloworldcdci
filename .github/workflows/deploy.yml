name: Django CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts


      - name: Deploy Project Files
        run: |
          rsync -avz --delete \
          -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
          ./ \
          root@${{ secrets.SERVER_IP }}:/var/www/djangoapp/


      - name: Install Dependencies and Restart Django
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@${{ secrets.SERVER_IP }} << 'EOF'

          cd /var/www/djangoapp

          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi

          source venv/bin/activate

          pip install --upgrade pip
          pip install -r requirements.txt

          python manage.py migrate
          python manage.py collectstatic --noinput

          pkill -f "runserver 8080" || true

          nohup python manage.py runserver 0.0.0.0:8080 &

          EOF